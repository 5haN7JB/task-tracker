openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Task Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: tasks
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskWithAssignees"
    post:
      operationId: createTask
      tags: [tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWithAssignees"

  /tasks/summary:
    get:
      operationId: getTaskSummary
      tags: [tasks]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSummary"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWithAssignees"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTask
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWithAssignees"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTask
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/{id}/feedback:
    post:
      operationId: addFeedback
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWithAssignees"

  /tasks/{id}/my-progress:
    patch:
      operationId: updateMyProgress
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProgressBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWithAssignees"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user, message]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [manager, employee]
        createdAt:
          type: string
      required: [id, email, name, role, createdAt]

    EmployeeProgress:
      type: object
      properties:
        userId:
          type: integer
        userName:
          type: string
        completionPercent:
          type: integer
        expectedCompletionDate:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]
      required: [userId, userName, completionPercent]

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        deadline:
          type: ["string", "null"]
        assigneeIds:
          type: array
          items:
            type: integer
      required: [title, description]

    UpdateTaskBody:
      type: object
      properties:
        status:
          type: string
          enum: [todo, in_progress, done]
        completionPercent:
          type: ["integer", "null"]
        expectedCompletionTime:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: string
        deadline:
          type: ["string", "null"]
        assigneeIds:
          type: array
          items:
            type: integer

    UpdateMyProgressBody:
      type: object
      properties:
        completionPercent:
          type: integer
        expectedCompletionDate:
          type: ["string", "null"]
      required: [completionPercent]

    FeedbackBody:
      type: object
      properties:
        feedback:
          type: string
      required: [feedback]

    TaskWithAssignees:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [todo, in_progress, done]
        deadline:
          type: ["string", "null"]
        completionPercent:
          type: ["integer", "null"]
        expectedCompletionTime:
          type: ["string", "null"]
        feedback:
          type: ["string", "null"]
        createdById:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        assignees:
          type: array
          items:
            $ref: "#/components/schemas/User"
        employeeProgress:
          type: array
          items:
            $ref: "#/components/schemas/EmployeeProgress"
      required: [id, title, description, status, createdById, createdAt, updatedAt, assignees, employeeProgress]

    TaskSummary:
      type: object
      properties:
        todo:
          type: integer
        in_progress:
          type: integer
        done:
          type: integer
        total:
          type: integer
      required: [todo, in_progress, done, total]
